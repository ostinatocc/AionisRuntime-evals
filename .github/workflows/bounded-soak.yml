name: Bounded Soak Authority

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Validate contracts, run protected pilot, or run protected soak
        required: true
        default: validate
        type: choice
        options:
          - validate
          - pilot
          - soak
      authorize_paid_execution:
        description: Explicitly acknowledge paid execution after environment approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: bounded-soak-${{ github.sha }}
  cancel-in-progress: false

jobs:
  contracts:
    name: Frozen contract tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact authority commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Verify Node and install without lifecycle scripts
        run: |
          set -euo pipefail
          test "$(git rev-parse 'HEAD^{commit}')" = "${GITHUB_SHA}"
          test "$(node -p 'process.versions.node.split(`.`)[0]')" = "24"
          npm ci --ignore-scripts
      - name: Run authority contract tests
        run: npm test
      - name: Validate frozen v0.3.12 fixtures
        run: npm run -s validate:fixture
      - name: Reject unapproved paid phase
        if: inputs.phase != 'validate' && inputs.authorize_paid_execution != true
        run: |
          printf '%s\n' 'paid pilot/soak requires explicit workflow input and protected environment approval' >&2
          exit 1

  paid-preflight:
    name: Protected ${{ inputs.phase }} preflight
    if: inputs.phase != 'validate' && inputs.authorize_paid_execution == true
    needs: contracts
    environment:
      name: bounded-soak
    runs-on:
      - self-hosted
      - linux
      - x64
      - aionis-soak-persistent
    timeout-minutes: 2280
    env:
      AIONIS_EXECUTION_PHASE: ${{ inputs.phase }}
      AIONIS_PROTECTED_ENVIRONMENT: bounded-soak
    steps:
      - name: Checkout exact authority commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install without lifecycle scripts
        run: |
          set -euo pipefail
          test "$(git rev-parse 'HEAD^{commit}')" = "${GITHUB_SHA}"
          test "$(node -p 'process.versions.node.split(`.`)[0]')" = "24"
          npm ci --ignore-scripts
      - name: Export frozen non-secret execution coordinates
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          const lock = JSON.parse(fs.readFileSync("config/v0.3.12-release-lock.json", "utf8"));
          const phaseCalls = "${{ inputs.phase }}" === "pilot"
            ? lock.execution_limits.pilot_chat_calls
            : lock.execution_limits.soak_chat_calls;
          const values = {
            AIONIS_CANDIDATE_COMMIT: lock.candidate.commit,
            AIONIS_CANDIDATE_DIGEST: lock.candidate.digest,
            AIONIS_AGENT_MODEL: lock.providers.agent.requested_model,
            AIONIS_EMBEDDING_MODEL: lock.providers.embedding.model,
            AIONIS_MAX_CHAT_CALLS: lock.execution_limits.maximum_chat_calls,
            AIONIS_MAX_COST_USD: lock.execution_limits.maximum_cost_usd,
            AIONIS_PHASE_CHAT_CALLS: phaseCalls,
          };
          fs.appendFileSync(process.env.GITHUB_ENV, `${Object.entries(values).map(([key, value]) => `${key}=${value}`).join("\n")}\n`);
          NODE
      - name: Run fail-closed protected preflight
        env:
          AIONIS_PAID_EXECUTION_APPROVED: "true"
        run: >-
          node src/run-bounded-soak.mjs "${{ inputs.phase }}"
          --lock config/v0.3.12-release-lock.json
          --authority fixtures/v0.3.12/authority-manifest.json
          --workload fixtures/v0.3.12/workload-manifest.json
          --harness-commit "${GITHUB_SHA}"
          --approval RUN_EXACT_FROZEN_BOUNDED_SOAK
          --execute

  evidence-publisher:
    name: Protected evidence publisher
    if: inputs.phase == 'soak' && inputs.authorize_paid_execution == true
    needs: paid-preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: bounded-soak-publisher
    steps:
      - name: Fail closed until the exact-run artifact publisher is implemented
        run: |
          printf '%s\n' 'EVIDENCE_PUBLISHER_UNAVAILABLE: no release asset can be published until the producer uploads six exact-run Actions artifacts and the publisher independently revalidates them' >&2
          exit 1
